# Profile-dependent DRI overrides applied on top of the baseline nutrition.json
# (which is a snapshot for 28yo active 150lb male).
#
# Most nutrients scale continuously with weight/energy (Energy itself,
# Protein, Fiber, Total Water) — those are computed in diet_opt/dri.py
# from closed-form formulas.
#
# The nutrients in this file have IOM-defined BRACKETED values that jump
# at age or sex boundaries rather than scale smoothly. We only patch
# those — the baseline covers the rest.
#
# Source: IOM 2005 Dietary Reference Intakes tables.

# Iron — women of reproductive age need much more than men or older women.
Iron:
  male:
    - {min_age: 19, low_bound: 8,  high_bound: 45, units: mg}    # 19-50
    - {min_age: 51, low_bound: 8,  high_bound: 45, units: mg}    # 51+
  female:
    - {min_age: 19, low_bound: 18, high_bound: 45, units: mg}    # 19-50 menstruating
    - {min_age: 51, low_bound: 8,  high_bound: 45, units: mg}    # post-menopausal
  nonbinary:
    - {min_age: 19, low_bound: 18, high_bound: 45, units: mg}    # conservative default

# Calcium — rises to 1200mg for 51+ women, 71+ men.
Calcium:
  male:
    - {min_age: 19, low_bound: 1000, high_bound: 2500, units: mg}    # 19-70
    - {min_age: 71, low_bound: 1200, high_bound: 2000, units: mg}    # 71+
  female:
    - {min_age: 19, low_bound: 1000, high_bound: 2500, units: mg}    # 19-50
    - {min_age: 51, low_bound: 1200, high_bound: 2000, units: mg}    # 51+
  nonbinary:
    - {min_age: 19, low_bound: 1000, high_bound: 2500, units: mg}

# Vitamin D — rises with age.
"Vitamin D":
  male:
    - {min_age: 19, low_bound: 15, high_bound: 100, units: mcg}    # 19-70 (600 IU)
    - {min_age: 71, low_bound: 20, high_bound: 100, units: mcg}    # 71+ (800 IU)
  female:
    - {min_age: 19, low_bound: 15, high_bound: 100, units: mcg}
    - {min_age: 71, low_bound: 20, high_bound: 100, units: mcg}
  nonbinary:
    - {min_age: 19, low_bound: 15, high_bound: 100, units: mcg}

# Zinc — IOM: 11mg men, 8mg women.
Zinc:
  male:
    - {min_age: 19, low_bound: 11, high_bound: 40, units: mg}
  female:
    - {min_age: 19, low_bound: 8,  high_bound: 40, units: mg}
  nonbinary:
    - {min_age: 19, low_bound: 10, high_bound: 40, units: mg}

# Magnesium — men higher.
Magnesium:
  male:
    - {min_age: 19, low_bound: 400, high_bound: 10000, units: mg}    # 19-30: 400; 31+: 420 (rounded)
    - {min_age: 31, low_bound: 420, high_bound: 10000, units: mg}
  female:
    - {min_age: 19, low_bound: 310, high_bound: 10000, units: mg}    # 19-30
    - {min_age: 31, low_bound: 320, high_bound: 10000, units: mg}    # 31+
  nonbinary:
    - {min_age: 19, low_bound: 360, high_bound: 10000, units: mg}

# Vitamin C — men 90, women 75.
"Vitamin C":
  male:
    - {min_age: 19, low_bound: 90, high_bound: 2000, units: mg}
  female:
    - {min_age: 19, low_bound: 75, high_bound: 2000, units: mg}
  nonbinary:
    - {min_age: 19, low_bound: 85, high_bound: 2000, units: mg}

# Choline — women lower.
Choline:
  male:
    - {min_age: 19, low_bound: 550, high_bound: 3500, units: mg}
  female:
    - {min_age: 19, low_bound: 425, high_bound: 3500, units: mg}
  nonbinary:
    - {min_age: 19, low_bound: 500, high_bound: 3500, units: mg}
